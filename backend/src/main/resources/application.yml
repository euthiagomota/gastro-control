spring:
  application:
    name: GastroControl

  # ====================================================
  # DATABASE
  # ====================================================
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gastrocontrol}
    username: ${DB_USERNAME:gastrocontrol}
    password: ${DB_PASSWORD:gastrocontrol123}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: GastroControlHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # ====================================================
  # JPA / HIBERNATE
  # ====================================================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 30
          fetch_size: 50
        order_inserts: true
        order_updates: true
        cache:
          use_second_level_cache: false
    open-in-view: false

  # ====================================================
  # FLYWAY MIGRATIONS
  # ====================================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ====================================================
  # CACHE
  # ====================================================
  cache:
    type: simple

  # ====================================================
  # FILE UPLOAD
  # ====================================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # ====================================================
  # MAIL
  # ====================================================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ====================================================
# SERVER
# ====================================================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

# ====================================================
# JWT SECURITY
# ====================================================
gastrocontrol:
  security:
    jwt:
      secret: ${JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoKYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoKYWJjZGVm}
      expiration: ${JWT_EXPIRATION:86400000}       # 24 horas em ms
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 dias em ms
  upload:
    dir: ${UPLOAD_DIR:uploads}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

# ====================================================
# SPRINGDOC / SWAGGER
# ====================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
  show-actuator: false

# ====================================================
# ACTUATOR
# ====================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: GastroControl
    description: Sistema SaaS de gestão gastronômica
    version: 1.0.0

# ====================================================
# LOGGING
# ====================================================
logging:
  level:
    root: INFO
    com.gastrocontrol: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/gastrocontrol.log
