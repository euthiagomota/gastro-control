version: '3.8'

services:
  # ====================================================
  # BANCO DE DADOS POSTGRESQL
  # ====================================================
  postgres:
    image: postgres:16-alpine
    container_name: gastrocontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gastrocontrol}
      POSTGRES_USER: ${DB_USERNAME:-gastrocontrol}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gastrocontrol123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gastrocontrol-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gastrocontrol} -d ${DB_NAME:-gastrocontrol}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================================================
  # BACKEND SPRING BOOT
  # ====================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastrocontrol-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-gastrocontrol}
      DB_USERNAME: ${DB_USERNAME:-gastrocontrol}
      DB_PASSWORD: ${DB_PASSWORD:-gastrocontrol123}
      JWT_SECRET: ${JWT_SECRET:-YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoKYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoKYWJjZGVm}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - gastrocontrol-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ====================================================
  # PGADMIN (OPCIONAL - DESENVOLVIMENTO)
  # ====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gastrocontrol-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gastrocontrol.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - gastrocontrol-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

networks:
  gastrocontrol-network:
    driver: bridge
